<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Calculator Pro</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">

<h2>Calculator</h2>

<input id="display" readonly>

<div class="buttons">

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('/')">÷</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('*')">×</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('-')">−</button>

<button onclick="press('0')">0</button>
<button onclick="press('.')">.</button>
<button onclick="calculate()">=</button>
<button onclick="press('+')">+</button>

<button class="clear" onclick="clearDisplay()">C</button>

</div>

</div>

<div id="popup" class="popup">

<div class="popup-content">

<h1>🔒 Premium Subscription Required</h1>

<p>
To unlock your calculation result,
please subscribe for only
<b>₱99.99/month</b>
</p>

<img src="gcash.png">

<p>Scan this GCash QR to continue.</p>

<button onclick="closePopup()">Maybe Later</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
